<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จริยาปิฎก | เนกขัมมะบารมี ๑๕ ชาติ</title>
  <meta name="description" content="ฟังธรรมบรรยายชุดจริยาปิฎก เนกขัมมะบารมี ๑๕ ชาติ โดยพระอาจารย์สมบัติ">
  <meta property="og:title" content="จริยาปิฎก | เนกขัมมะบารมี ๑๕ ชาติ">
  <meta property="og:description" content="ฟังธรรมบรรยายชุดจริยาปิฎก เนกขัมมะบารมี ๑๕ ชาติ โดยพระอาจารย์สมบัติ">
  <meta property="og:image" content="https://dhammasutta.github.io/images/dhamma-logo-512.png">
  <link rel="icon" href="https://dhammasutta.github.io/images/dhamma-logo-512.png" type="image/png">
  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      margin: 0;
      padding: 20px;
      background: #fffdf6;
      color: #222;
    }
    h1, h2 {
      text-align: center;
      color: #6b4c2f;
    }
    ul#audioList {
      list-style: none;
      max-width: 700px;
      margin: 0 auto;
      padding-left: 0;
      padding-bottom: 120px; /* เพิ่มพื้นที่ด้านล่างเพื่อไม่ให้แถบลอยไปบังเนื้อหาตอนสุดท้าย */
    }
    ul#audioList li {
      margin: 15px 0;
      display: flex;
      align-items: flex-start;
      background-color: #f3e9db;
      padding: 10px;
      border-radius: 8px;
    }
    
    /* 🎯 ปรับแต่งปุ่มฟังธรรมให้เท่ากันและเป็นระเบียบเรียบร้อย */
    ul#audioList button {
      margin-right: 12px;
      padding: 5px 0;
      width: 75px;             /* ล็อกความกว้างปุ่มให้เท่ากันทุกตอน */
      text-align: center;      /* จัดให้อยู่กึ่งกลางปุ่ม */
      background: #6b4c2f;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      flex-shrink: 0;          /* ล็อกขนาดไม่ให้โย้เย้เวลาเปิดบนมือถือ */
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
    }
    ul#audioList span {
      font-size: 18px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    
    /* 🎯 ตัวเครื่องเล่นเสียง */
    audio {
      display: block;
      width: 100%;
      max-width: 700px;
      margin: 0 auto; /* จัดเครื่องเล่นให้อยู่กึ่งกลางกล่อง */
      box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.15);
    }

    /* 🎯 แถบควบคุมสีครีมลอยติดหนึบด้านล่างหน้าจอ */
    .audio-player-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #f9f3e7;
      padding: 15px 20px;
      box-sizing: border-box;
      z-index: 1000;
      border-top: 3px solid #6b4c2f;
    }
  </style>
</head>
<body>

<div style="max-width: 800px; margin: 0 auto 20px auto; padding: 20px; background-color: #f9f3e7; border-left: 5px solid #6b4c2f; border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 18px; line-height: 1.7; color: #333;">
  <strong>จริยาปิฎก</strong> เป็นคัมภีร์หนึ่งในชุด <strong>ขุททกนิกาย</strong> ของพระไตรปิฎกฝ่ายเถรวาท ว่าด้วยการประพฤติ (จริยา) ของพระมหาโพธิสัตว์  
  เนื้อหาในคัมภีร์นี้เป็นเรื่องราวการบำเพ็ญบารมีก่อนการตรัสรู้เป็นพระสัมมาสัมพุทธเจ้า
</div>

<h1>📚 จริยาปิฎก</h1>
<h2>การสร้างเนกขัมมะบารมีของพระมหาโพธิสัตว์ ๑๕ ชาติ</h2>

<ul id="audioList"></ul>

<div class="audio-player-container">
  <audio id="audioPlayer" controls>
    <source src="">
    เบราว์เซอร์ของคุณไม่รองรับการเล่นเสียง
  </audio>
</div>

<script>
  const episodes = [
    {
      title: "เหตุแสดงจริยาปิฏก\nจริยาที่ ๑ ว่าด้วยจริยาวัตรของยุธัญชยกุมาร\nจริยาที่ ๒ ว่าด้วยจริยาวัตรของโสมนัสสกุมาร",
      url: "https://archive.org/download/panya1/panya1.mp3"
    },
    {
      title: "จริยาที่ ๓ ว่าด้วยจริยาวัตรของอโยฆรกุมาร\nจริยาที่ ๔ ว่าด้วยจริยาวัตรของภิงสพราหมณ์",
      url: "https://archive.org/download/panya1/panya2.mp3"
    },
    {
      title: "จริยาที่ ๕ ว่าด้วยจริยาวัตรของโสณนันทบัณฑิต\nจริยาที่ ๖ ว่าด้วยจริยาวัตรของมูลผักขกุมาร",
      url: "https://archive.org/download/panya1/panya3.mp3"
    },
    {
      title: "จริยาที่ ๗ ว่าด้วยจริยาวัตรของพระยาวานร\nจริยาที่ ๘ ว่าด้วยจริยาวัตรของสัจจดาบส\nจริยาที่ ๙ ว่าด้วยจริยาวัตรของลูกนกคุ้ม\nจริยาที่ ๑๐ ว่าด้วยจริยาวัตรของพระยาปลา\nจริยาที่ ๑๑ ว่าด้วยจริยาวัตรของกัณหทีปายนะดาบส",
      url: "https://archive.org/download/panya1/panya4.mp3"
    },
    {
      title: "จริยาที่ ๑๒ ว่าด้วยจริยาวัตรของพระเจ้าสุตโสม\nจริยาที่ ๑๓ ว่าด้วยจริยาวัตรของสุวรรณสามดาบส",
      url: "https://archive.org/download/panya1/panya5.mp3"
    },
    {
      title: "จริยาที่ ๑๔ ว่าด้วยจริยาวัตรของพระเจ้าเอกราช\nจริยาที่ ๑๕ ว่าด้วยจริยาวัตรของมหาโลมหังสบัณฑิต",
      url: "https://archive.org/download/panya1/panya6.mp3"
    }
  ];

  const listContainer = document.getElementById("audioList");
  const audioPlayer = document.getElementById("audioPlayer");

  // โหลดเสียงล่าสุดที่เล่น
  const lastPlayed = localStorage.getItem("lastAudio");
  if (lastPlayed) {
    audioPlayer.src = lastPlayed;
  }

  // สร้างรายการ
  episodes.forEach(item => {
    const li = document.createElement("li");

    const button = document.createElement("button");
    button.textContent = "▶️ ฟัง";
    button.onclick = () => {
      audioPlayer.src = item.url;
      audioPlayer.play();
      localStorage.setItem("lastAudio", item.url);
      localStorage.setItem("lastAudioTitle", item.title);
    };

    const label = document.createElement("span");
    label.innerHTML = item.title.replace(/\n/g, "<br>");

    li.appendChild(button);
    li.appendChild(label);
    listContainer.appendChild(li);
  });
</script>

</body>
</html>
